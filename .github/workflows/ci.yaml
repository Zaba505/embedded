name: CI

on:
  push:
    branches: [main]
  pull_request:

# Module pins live in dagger.json now: the top-level `ci` Dagger module installs
# the `zig` and `bossac` toolchains, pinning zig by commit SHA (z5labs/devex
# publishes no tags -- bump it deliberately). So the steps below call
# `dagger call <fn>` against that module directly, no `-m <ref>@SHA` per step.
# DAGGER_VERSION pins the CLI to the engine the module targets; the toolchain
# feature is experimental in this version, so the CLI is pinned with it.
env:
  DAGGER_VERSION: "0.21.7"
  PROJECT: ./arduino-due/blinky

jobs:
  # A repo-wide gate, deliberately not per-board: the ci module's line-length
  # function scans every tracked Zig source and Markdown prose file in a single
  # pass, so the 100-column limit (zig-style-guide.md §2.2) applies to every
  # project uniformly. The same function a developer runs with `dagger call`.
  line-length:
    name: line length
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | DAGGER_VERSION="$DAGGER_VERSION" BIN_DIR=/usr/local/bin sudo -E sh
          dagger version

      - name: 100-column limit
        run: dagger call line-length --source=.

  blinky:
    name: arduino-due/blinky
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | DAGGER_VERSION="$DAGGER_VERSION" BIN_DIR=/usr/local/bin sudo -E sh
          dagger version

      # Satisfies the story's "formatting is checked in the pipeline via the
      # zig module's fmt function". It is check-only and never rewrites.
      - name: zig fmt --check
        run: dagger call zig fmt --source="$PROJECT"

      # This step is the strictest-diagnostics gate (§2.4) for the firmware.
      # Zig has no separate warning level: unused variables and parameters,
      # unreachable code and ignored errors are hard compile errors, so a clean
      # `build` at Zig's only setting already fails on everything another
      # compiler would merely warn about -- there is no -Werror to add. The gate
      # is therefore "every project actually compiles," which is why the check
      # below matters:
      #
      # Deliberately a plain `build` rather than the module's `ci ... check`.
      # `check` runs fmt and test only -- it does not compile, and this project
      # has no test step, so it reports success on a build that does not even
      # type-check. Verified by breaking main() on purpose: `check` exited 0
      # while `build` exited 1.
      - name: Build firmware
        run: dagger call zig build --source="$PROJECT"

      - name: Export ELF and raw image
        run: |
          dagger call zig build --source="$PROJECT" \
            file --path=bin/blinky.elf export --path=./blinky.elf
          dagger call zig obj-copy \
            --input=./blinky.elf --format=binary export --path=./blinky.bin

      # The strongest check available without a board attached. A Cortex-M3
      # reads two words from address 0 on reset; if either is wrong the board
      # hard-faults instantly, and nothing earlier in this job would notice.
      - name: Assert the reset vectors are sane
        run: |
          python3 - <<'PY'
          import struct, sys
          img = open("blinky.bin", "rb").read()
          sp, reset = struct.unpack_from("<II", img, 0)
          ok = True
          if sp != 0x20010000:
              print(f"FAIL initial SP 0x{sp:08x}, expected 0x20010000 (top of SRAM0)"); ok = False
          if not (0x00080000 <= reset < 0x000C0000):
              print(f"FAIL reset vector 0x{reset:08x} outside flash bank 0"); ok = False
          if not reset & 1:
              print(f"FAIL reset vector 0x{reset:08x} has no Thumb bit"); ok = False
          print(f"SP=0x{sp:08x} reset=0x{reset:08x} size={len(img)}B")
          sys.exit(0 if ok else 1)
          PY

      # Exercises the flash path as far as is possible with no hardware: this
      # renders the exact commands and never contacts a board.
      - name: Render the flash command
        run: |
          dagger call bossac sam-ba \
            --firmware=./blinky.bin \
            --usbip=ci.invalid:3240 --busid=0-0 \
            plan

  assert:
    name: lib/assert
    runs-on: ubuntu-latest
    env:
      LIB: ./lib/assert
    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | DAGGER_VERSION="$DAGGER_VERSION" BIN_DIR=/usr/local/bin sudo -E sh
          dagger version

      # Same check-only fmt gate as the firmware; never rewrites.
      - name: zig fmt --check
        run: dagger call zig fmt --source="$LIB"

      # Host unit tests of the primitive's logic (the on/off knob, the
      # pass-through path). Unlike the blinky, this package is host-compilable
      # and so has a real test step.
      #
      # This is also the library's strictest-diagnostics gate (§2.4): compiling
      # the tests type-checks the code, and the `refAllDeclsRecursive` test
      # forces every public declaration through the compiler, so a decl no test
      # calls cannot ship un-checked. As with the firmware, Zig's would-be
      # warnings are hard errors, so a clean compile is the strictest setting.
      - name: Unit tests
        run: dagger call zig test --source="$LIB"

      # The negative-space check for this package, in the spirit of the
      # firmware's "Assert the reset vectors are sane": build the size-delta
      # benchmark for a real MCU target and fail if a failed assertion costs
      # more than a bare trap -- i.e. if formatting/unwind/panic machinery ever
      # sneaks back into the failure path. The script is the same one a
      # developer runs locally, so CI and the README measure identically.
      - name: Assert an assertion compiles to a bare trap
        run: ./lib/assert/bench/measure.sh
